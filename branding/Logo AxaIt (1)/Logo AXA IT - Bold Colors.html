// Base wordmark: AXA · IT with a bar below + dot on axis
// Each variant re-skins color, typography weight, background, and mark treatment

const Word = ({ color, weight = 600, size = 44, track = 0.04, children }) => (
  <div style={{
    fontFamily: "'Space Grotesk', sans-serif",
    fontWeight: weight, fontSize: size,
    letterSpacing: `${track}em`, textTransform: 'uppercase',
    color, lineHeight: 1,
  }}>{children}</div>
);

const Bar = ({ color, dotColor, dotBorder, width = 240, dotRight = 42, dotSize = 8 }) => (
  <div style={{ width, height: 1.5, background: color, position: 'relative' }}>
    <div style={{
      position: 'absolute', top: '50%', transform: 'translateY(-50%)',
      right: dotRight, width: dotSize, height: dotSize,
      borderRadius: '50%', background: dotColor,
      border: `1.5px solid ${dotBorder || color}`,
    }} />
  </div>
);

const Tag = ({ color, children, size = 10 }) => (
  <div style={{
    fontFamily: "'Space Grotesk', sans-serif",
    fontSize: size, letterSpacing: '0.4em', textTransform: 'uppercase',
    color, fontWeight: 500,
  }}>{children}</div>
);

const Lockup = ({ word, bar, tag, wordEl }) => (
  <div style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
    {wordEl || <Word {...word}>AXA · IT</Word>}
    <Bar {...bar} />
    {tag && <Tag {...tag}>Enterprise IT Partner</Tag>}
  </div>
);

// ═══════════════════════════════════════════════════════════════
// Showcase component
// ═══════════════════════════════════════════════════════════════

const Card = ({ bg, children, label, labelColor }) => (
  <div style={{
    background: bg, minHeight: 240, display: 'flex', alignItems: 'center', justifyContent: 'center',
    position: 'relative', overflow: 'hidden',
  }}>
    {label && (
      <div style={{
        position: 'absolute', top: 14, left: 16,
        fontSize: 10, letterSpacing: '0.2em', textTransform: 'uppercase',
        color: labelColor || 'rgba(0,0,0,0.45)', fontWeight: 600,
        fontFamily: "'Space Grotesk', sans-serif",
      }}>{label}</div>
    )}
    {children}
  </div>
);

const Showcase = ({ variant }) => (
  <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
    {/* Hero panel — bold colored bg */}
    <div style={{ flex: '0 0 auto' }}>
      <Card bg={variant.heroBg} label="HERO" labelColor={variant.heroLabelColor}>
        {variant.renderHero()}
      </Card>
    </div>
    {/* Light */}
    <div style={{ flex: '0 0 auto' }}>
      <Card bg="#FFFFFF" label="LIGHT">
        {variant.renderLight()}
      </Card>
    </div>
    {/* Mark + favicon row */}
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', flex: '0 0 auto' }}>
      <Card bg="#F4F4F5" label="MARK">
        {variant.renderMark(80)}
      </Card>
      <Card bg={variant.markDarkBg || '#0B1220'} label="MARK · DARK" labelColor="rgba(255,255,255,0.5)">
        {variant.renderMarkDark(80)}
      </Card>
    </div>
    {/* Description */}
    <div style={{
      padding: '16px 18px', background: '#fff',
      borderTop: '1px solid rgba(0,0,0,0.06)',
      fontSize: 12, lineHeight: 1.55, color: '#3F3F46',
      flex: 1,
    }}>
      <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 14, fontWeight: 700, color: '#18181B', marginBottom: 6 }}>
        {variant.name}
      </div>
      <div>{variant.description}</div>
      <div style={{ marginTop: 10, display: 'flex', gap: 6, flexWrap: 'wrap' }}>
        {variant.palette.map((c, i) => (
          <div key={i} style={{
            display: 'flex', alignItems: 'center', gap: 5,
            background: '#F4F4F5', padding: '3px 8px', borderRadius: 3,
            fontFamily: "'JetBrains Mono', monospace", fontSize: 10,
          }}>
            <div style={{ width: 10, height: 10, background: c.hex, border: c.hex === '#FFFFFF' ? '1px solid #ddd' : 'none' }} />
            <span>{c.hex}</span>
          </div>
        ))}
      </div>
    </div>
  </div>
);

      <div style={{ position: 'absolute', bottom: s*0.22, left: s*0.22, right: s*0.22, height: 1.5, background: '#FB7185' }} />
      <div style={{ position: 'absolute', bottom: s*0.22 - 3, right: s*0.3, width: 6, height: 6, borderRadius: '50%', background: '#FB7185', border: '1.5px solid #fff' }} />
    </div>
  ),
  renderMarkDark: (s) => (
    <div style={{
      width: s, height: s, background: '#FB7185', borderRadius: '50%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700,
      fontSize: s * 0.3, color: '#0F766E', position: 'relative',
    }}>
      AXA
      <div style={{ position: 'absolute', bottom: s*0.22, left: s*0.22, right: s*0.22, height: 1.5, background: '#0F766E' }} />
      <div style={{ position: 'absolute', bottom: s*0.22 - 3, right: s*0.3, width: 6, height: 6, borderRadius: '50%', background: '#0F766E' }} />
    </div>
  ),
};

const variants = [v1, v2, v3, v4, v5, v6];

const renderBoard = (v, i) => (
  <DCArtboard key={i} id={`bold-${i}`} label={v.name} width={440} height={860}>
    <Showcase variant={v} />
  </DCArtboard>
);

function App() {
  return (
    <DesignCanvas
      title="Logo AXA IT — Direcții bold de culoare"
      subtitle="Aceeași structură (wordmark + axă + punct), 6 tratări vizuale cu impact — de la energie brută la gradient modern"
    >
      <DCSection id="bold" title="6 direcții de culoare">
        {variants.map(renderBoard)}
      </DCSection>

      <DCSection id="info" title="Cum alegem">
        <DCArtboard id="info-card" label="Ghid" width={560} height={420}>
          <div style={{ padding: 36, background: '#fff', height: '100%', fontSize: 14, lineHeight: 1.65, color: '#27272A' }}>
            <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 22, fontWeight: 700, marginBottom: 18, letterSpacing: '-0.02em' }}>Fiecare variantă arată:</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <div>🔥 <strong>Hero</strong> — cum arată logo-ul pe brand color plin (banner, poster)</div>
              <div>📄 <strong>Light</strong> — pe fundal alb (hârtie, print, site)</div>
              <div>🔹 <strong>Mark</strong> — varianta iconiță pentru favicon/avatar</div>
              <div>🎨 <strong>Paleta</strong> — cele 3 culori cheie</div>
            </div>
            <div style={{ marginTop: 22, padding: 14, background: '#FEF3C7', borderRadius: 6, fontSize: 13, lineHeight: 1.55 }}>
              <strong>Spune-mi:</strong> care 1-2 variante îți plac cel mai mult? Putem combina (ex: structura de la V1 cu paleta de la V3) sau ajusta orice detaliu (saturație, punct, font).
            </div>
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
