<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="aibg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="airobot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5A1F" stop-opacity="0.9"/>
      <stop offset="100%" style="stop-color:#FF5A1F" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#aibg)"/>
  <circle cx="150" cy="150" r="170" fill="#FF5A1F" opacity="0.08"/>
  <circle cx="680" cy="310" r="120" fill="#FF5A1F" opacity="0.06"/>
  <!-- Robot / AI head -->
  <g transform="translate(320, 90)">
    <!-- Antenna -->
    <line x1="80" y1="0" x2="80" y2="20" stroke="#FF5A1F" stroke-width="3"/>
    <circle cx="80" cy="0" r="5" fill="#FF5A1F"/>
    <!-- Head -->
    <rect x="15" y="20" width="130" height="110" rx="20" fill="url(#airobot)" stroke="#FF5A1F" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="55" cy="65" r="11" fill="#FAFAFA"/>
    <circle cx="105" cy="65" r="11" fill="#FAFAFA"/>
    <circle cx="55" cy="65" r="5" fill="#0A0A0A"/>
    <circle cx="105" cy="65" r="5" fill="#0A0A0A"/>
    <!-- Mouth / chip line -->
    <rect x="50" y="95" width="60" height="8" rx="4" fill="#FAFAFA" opacity="0.85"/>
    <!-- Neck -->
    <rect x="65" y="130" width="30" height="15" fill="#FF5A1F" opacity="0.6"/>
    <!-- Body / base -->
    <rect x="25" y="145" width="110" height="50" rx="8" fill="#FF5A1F" opacity="0.3" stroke="#FF5A1F" stroke-width="2"/>
    <text x="80" y="178" text-anchor="middle" fill="#FAFAFA" font-family="system-ui" font-size="16" font-weight="700" opacity="0.95">AI</text>
  </g>
  <!-- Binary-like dots -->
  <text x="140" y="280" fill="#FF5A1F" font-family="monospace" font-size="12" opacity="0.4">01 10 11</text>
  <text x="610" y="120" fill="#FF5A1F" font-family="monospace" font-size="12" opacity="0.4">10 01 00</text>
  <circle cx="180" cy="340" r="4" fill="#FF5A1F" opacity="0.6"/>
  <circle cx="640" cy="200" r="4" fill="#FF5A1F" opacity="0.5"/>
  <text x="400" y="330" text-anchor="middle" fill="#FAFAFA" font-family="system-ui" font-size="22" font-weight="500" opacity="0.95">AI in IT Business</text>
  <text x="400" y="358" text-anchor="middle" fill="#FAFAFA" font-family="system-ui" font-size="13" opacity="0.4">AXA IT Blog</text>
</svg>
