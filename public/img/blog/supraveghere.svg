<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg9)"/>
  <!-- Camera -->
  <g transform="translate(480, 140)">
    <rect x="0" y="30" width="200" height="120" rx="15" fill="#0d9488" opacity="0.2" stroke="#5eead4" stroke-width="2"/>
    <circle cx="100" cy="90" r="40" fill="none" stroke="#5eead4" stroke-width="2" opacity="0.5"/>
    <circle cx="100" cy="90" r="20" fill="#0d9488" opacity="0.4"/>
    <circle cx="100" cy="90" r="8" fill="#5eead4" opacity="0.6"/>
    <!-- Lens shine -->
    <circle cx="92" cy="82" r="4" fill="white" opacity="0.3"/>
    <!-- LED -->
    <circle cx="30" cy="50" r="5" fill="#ef4444" opacity="0.7"/>
  </g>
  <!-- Grid/monitor lines -->
  <g transform="translate(350, 320)">
    <rect x="0" y="0" width="500" height="10" rx="5" fill="#5eead4" opacity="0.1"/>
    <rect x="0" y="20" width="500" height="10" rx="5" fill="#5eead4" opacity="0.08"/>
    <rect x="0" y="40" width="500" height="10" rx="5" fill="#5eead4" opacity="0.06"/>
    <rect x="0" y="60" width="300" height="10" rx="5" fill="#5eead4" opacity="0.04"/>
  </g>
  <text x="600" y="480" text-anchor="middle" fill="white" font-family="system-ui" font-size="28" font-weight="500" opacity="0.9">Supraveghere Video IP</text>
  <text x="600" y="520" text-anchor="middle" fill="white" font-family="system-ui" font-size="16" opacity="0.4">AXA IT Blog</text>
</svg>