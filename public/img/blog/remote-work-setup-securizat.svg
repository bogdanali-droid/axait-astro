<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="remotebg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#remotebg)"/>
  <circle cx="120" cy="120" r="160" fill="#FF5A1F" opacity="0.08"/>
  <circle cx="680" cy="300" r="140" fill="#FF5A1F" opacity="0.06"/>
  <!-- Laptop with lock / secure tunnel -->
  <g transform="translate(280, 110)">
    <!-- Laptop body -->
    <rect x="20" y="20" width="200" height="120" rx="8" fill="#FF5A1F" opacity="0.25" stroke="#FF5A1F" stroke-width="2"/>
    <rect x="35" y="35" width="170" height="90" rx="3" fill="#0A0A0A"/>
    <!-- Lock on screen -->
    <g transform="translate(105, 55)">
      <rect x="0" y="15" width="40" height="35" rx="4" fill="#FF5A1F" opacity="0.9"/>
      <path d="M8 15 L8 8 C8 2 13 -2 20 -2 C27 -2 32 2 32 8 L32 15" fill="none" stroke="#FAFAFA" stroke-width="3"/>
      <circle cx="20" cy="30" r="3" fill="#FAFAFA"/>
      <rect x="18" y="30" width="4" height="10" fill="#FAFAFA"/>
    </g>
    <!-- Laptop base -->
    <rect x="0" y="140" width="240" height="10" rx="3" fill="#FF5A1F" opacity="0.4"/>
    <!-- Secure tunnel lines (VPN-ish) -->
    <path d="M -40 80 Q -20 80 0 70" fill="none" stroke="#FF5A1F" stroke-width="3" stroke-dasharray="6 4" opacity="0.7"/>
    <path d="M 240 70 Q 260 80 280 80" fill="none" stroke="#FF5A1F" stroke-width="3" stroke-dasharray="6 4" opacity="0.7"/>
    <!-- Cloud on side -->
    <g transform="translate(240, 50)" fill="#FAFAFA" opacity="0.85">
      <ellipse cx="20" cy="20" rx="20" ry="13"/>
      <ellipse cx="35" cy="15" rx="14" ry="10"/>
    </g>
    <!-- Home icon on other side -->
    <g transform="translate(-65, 55)" fill="#FAFAFA" opacity="0.85">
      <polygon points="15,0 30,15 5,15"/>
      <rect x="8" y="15" width="20" height="15"/>
    </g>
  </g>
  <!-- Accent dots -->
  <circle cx="170" cy="300" r="4" fill="#FF5A1F" opacity="0.5"/>
  <circle cx="650" cy="120" r="5" fill="#FF5A1F" opacity="0.4"/>
  <circle cx="130" cy="250" r="3" fill="#FF5A1F" opacity="0.6"/>
  <text x="400" y="330" text-anchor="middle" fill="#FAFAFA" font-family="system-ui" font-size="22" font-weight="500" opacity="0.95">Remote Work Securizat</text>
  <text x="400" y="358" text-anchor="middle" fill="#FAFAFA" font-family="system-ui" font-size="13" opacity="0.4">AXA IT Blog</text>
</svg>
