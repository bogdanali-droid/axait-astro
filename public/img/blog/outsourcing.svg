<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#9333ea"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg7)"/>
  <!-- People network -->
  <g transform="translate(600, 260)">
    <!-- Center node -->
    <circle cx="0" cy="0" r="35" fill="#9333ea" opacity="0.3" stroke="#c084fc" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" font-weight="600" opacity="0.8">IT</text>
    <!-- Surrounding nodes -->
    <circle cx="-150" cy="-80" r="25" fill="#7c3aed" opacity="0.2" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="150" cy="-80" r="25" fill="#7c3aed" opacity="0.2" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="-150" cy="80" r="25" fill="#7c3aed" opacity="0.2" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="150" cy="80" r="25" fill="#7c3aed" opacity="0.2" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="0" cy="-130" r="25" fill="#7c3aed" opacity="0.2" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="0" cy="130" r="25" fill="#7c3aed" opacity="0.2" stroke="#a78bfa" stroke-width="1.5"/>
    <!-- Lines -->
    <line x1="0" y1="0" x2="-150" y2="-80" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="150" y2="-80" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="-150" y2="80" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="150" y2="80" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="-130" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="130" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  </g>
  <text x="600" y="490" text-anchor="middle" fill="white" font-family="system-ui" font-size="28" font-weight="500" opacity="0.9">Outsourcing IT</text>
  <text x="600" y="530" text-anchor="middle" fill="white" font-family="system-ui" font-size="16" opacity="0.4">AXA IT Blog</text>
</svg>