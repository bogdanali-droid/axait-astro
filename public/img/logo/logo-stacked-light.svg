<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240" class="axa-logo-stacked">
  <title>AXA IT Logo Stacked — Light</title>
  <defs>
    <style>
      .axa-word-stacked { font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: 0.03em; }
      .axa-accent { fill: #FF5A1F; }
      .axa-line { stroke: #0A0A0A; stroke-width: 2; }
      .axa-dot { fill: #FF5A1F; stroke: #0A0A0A; stroke-width: 1.5; }
      .axa-tag-stacked { font-family: 'Space Grotesk', sans-serif; font-size: 8px; font-weight: 600; letter-spacing: 0.35em; text-transform: uppercase; fill: rgba(10,10,10,0.55); }
    </style>
  </defs>
  <g>
    <text class="axa-word-stacked" x="100" y="45" text-anchor="middle" fill="#0A0A0A" font-size="32">
      AXA<tspan class="axa-accent">·</tspan>
    </text>
    <line class="axa-line" x1="30" y1="65" x2="170" y2="65"></line>
    <text class="axa-word-stacked" x="100" y="110" text-anchor="middle" fill="#FF5A1F" font-size="48" letter-spacing="0.06em">IT</text>
    <text class="axa-tag-stacked" x="100" y="135" text-anchor="middle">ENTERPRISE IT PARTNER</text>
  </g>
</svg>