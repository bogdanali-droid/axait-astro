<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120" class="axa-logo">
  <title>AXA IT Logo — Dark</title>
  <defs>
    <style>
      .axa-word { font-family: 'Space Grotesk', sans-serif; font-size: 56px; font-weight: 700; letter-spacing: 0.03em; }
      .axa-accent { fill: #FF5A1F; }
      .axa-line { stroke: #FFFFFF; stroke-width: 2; }
      .axa-dot { fill: #FF5A1F; stroke: #FFFFFF; stroke-width: 1.5; }
      .axa-tag { font-family: 'Space Grotesk', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.4em; text-transform: uppercase; }
    </style>
  </defs>
  <g>
    <text class="axa-word" x="300" y="55" text-anchor="middle" fill="#FFFFFF">
      AXA <tspan class="axa-accent">·</tspan> IT
    </text>
    <line class="axa-line" x1="60" y1="75" x2="540" y2="75"></line>
    <circle class="axa-dot" cx="460" cy="75" r="6"></circle>
    <text class="axa-tag" x="300" y="100" text-anchor="middle" fill="#FF5A1F">ENTERPRISE IT PARTNER</text>
  </g>
</svg>